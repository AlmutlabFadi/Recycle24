name: CI 

on: 
  pull_request: 
    branches: [main, develop] 

jobs: 
  verify: 
    runs-on: ubuntu-latest 

    steps: 
      - uses: actions/checkout@v4 
        with:
          fetch-depth: 0

      - name: Install 
        run: npm install 

      - name: Lint 
        run: npm run lint 

      - name: Typecheck 
        run: npm run typecheck 

      - name: Build 
        run: npm run build

      - name: Deps Budget 
        run: node governance/deps-budget.js

      - name: Prisma Migration Guard 
        run: bash governance/prisma-migration-guard.sh
