name: CI

on:
  push:
    branches:
      - master
      - main
      - develop
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest

    env:
      DATABASE_URL: postgresql://ci:ci@localhost:5432/ci
      NEXTAUTH_SECRET: ci-secret
      JWT_SECRET: ci-secret

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Prisma generate
        run: npx prisma generate

      - name: Governance guard - no bootstrap in admin runtime
        run: npm run guard:no-bootstrap-runtime

      - name: Governance guard - admin routes require permission
        run: npm run guard:admin-permissions

      - name: Typecheck
        run: npm run typecheck

      - name: Build
        run: npm run build
